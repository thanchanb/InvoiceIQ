name: InvoiceIQ CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

  contract-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      run: |
        rustup update stable
        rustup default stable
        rustup target add wasm32-unknown-unknown

    - name: Contract Build
      run: |
        cd contracts/invoice_contract
        cargo build --release --target wasm32-unknown-unknown

    - name: Contract Test
      run: |
        cd contracts/invoice_contract
        cargo test
